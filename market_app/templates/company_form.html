{% extends "base.html" %}

{% block content %}
<section class="panel">
  <h2>Add Company</h2>
  <form method="post" class="form-grid">
    <label>Company Name<input name="name" required></label>
    <label>Sector<input name="sector"></label>
    <label>Industry<input name="industry"></label>
    <label>Ownership Type<input name="ownership_type"></label>
    <label>Regulator<input name="regulator"></label>
    <label>Website<input name="website"></label>
    <label>Status<input name="status" value="Research"></label>
    <label>Contact Phone<input name="contact_phone"></label>
    <label>Contact Email<input name="contact_email"></label>
    <label>Contact Address<input name="contact_address"></label>
    <label class="wide">Investor Notes<textarea name="investor_notes" rows="3"></textarea></label>

    <label>Economy Score
      <select name="economy_score">
        <option value="0">0</option>
        <option value="1">1</option>
        <option value="2">2</option>
      </select>
    </label>
    <label>Industry Score
      <select name="industry_score">
        <option value="0">0</option>
        <option value="1">1</option>
        <option value="2">2</option>
      </select>
    </label>
    <label>Business Strength Score
      <select name="business_strength_score">
        <option value="0">0</option>
        <option value="1">1</option>
        <option value="2">2</option>
      </select>
    </label>
    <label>Financial Health Score
      <select name="financial_health_score">
        <option value="0">0</option>
        <option value="1">1</option>
        <option value="2">2</option>
      </select>
    </label>
    <label>Valuation Score
      <select name="valuation_score">
        <option value="0">0</option>
        <option value="1">1</option>
        <option value="2">2</option>
      </select>
    </label>
    <label>Current Price<input name="current_price" type="number" step="0.01"></label>
    <label>EPS<input name="eps" type="number" step="0.01"></label>
    <label>Implied P/E<input name="implied_pe" type="number" step="0.01"></label>
    <label>Target Price (20% yield)<input name="target_price_for_20pc" type="number" step="0.01"></label>
    <label>Confidence<input name="confidence" value="Medium"></label>

    <label class="wide">Industry Analysis<textarea name="industry_analysis" rows="4"></textarea></label>
    <label class="wide">Financial Analysis<textarea name="financial_analysis" rows="4"></textarea></label>
    <label class="wide">Economy Notes<textarea name="economy_notes" rows="3"></textarea></label>
    <label class="wide">Industry Notes<textarea name="industry_notes" rows="3"></textarea></label>
    <label class="wide">Business Notes<textarea name="business_notes" rows="3"></textarea></label>
    <label class="wide">Financial Notes<textarea name="financial_notes" rows="3"></textarea></label>
    <label class="wide">Valuation Notes<textarea name="valuation_notes" rows="3"></textarea></label>

    <button type="submit">Create company</button>
  </form>
</section>
{% endblock %}
