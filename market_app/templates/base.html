    <title>Ethiopian Market Intelligence</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <header class="hero">
      <div>
        <p class="eyebrow">Draft System</p>
        <h1>Ethiopian Market Intelligence</h1>

      </div>
      <nav>
        <a href="{{ url_for('market.index') }}">Dashboard</a>

    <main class="layout">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
