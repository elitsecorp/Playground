<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ethiopian Investment Navigator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div>
        <p class="eyebrow">Static insight</p>
        <h1>Ethiopian Financial Scorecards</h1>
        <p>Filter, sort, and target the best opportunities across banks, MFIs, SACCOs, and telecom investors.</p>
      </div>
      <button class="action" onclick="window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'})">
        Jump to target prices
      </button>
    </header>

    <section class="controls">
      <label>
        Industry
        <select id="industryFilter">
          <option value="">All</option>
        </select>
      </label>
      <label>
        Min Score
        <input id="scoreFilter" type="number" min="0" max="10" value="0" />
      </label>
      <label>
        Sort By
        <select id="sortSelect">
          <option value="score">Score ?</option>
          <option value="price">Price ?</option>
          <option value="pe">P/E ?</option>
          <option value="target">Target Price ?</option>
        </select>
      </label>
      <label>
        Search
        <input id="searchInput" type="search" placeholder="Search name, note, contact" />
      </label>
    </section>

    <main id="app" class="grid">
      <p>Loading data…</p>
    </main>

    <script type="module" src="script.js"></script>
  </body>
</html>
